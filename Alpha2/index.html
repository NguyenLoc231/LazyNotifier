<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LazyNotifier</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <nav id="top-nav-bar">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <h1>Schedule Reminder</h1>
    </header>

    <main>
        <section id="home">
            <h2>Mi Schedule</h2>
            <div>
                <button type="button">move to the previous day</button><br>
                <input type="date" name="date" required><br>
                <button type="button">move to the next day</button>
            </div>

            <div id="schedule__list">
                <div id="list__container">

                    <!-- html để trực quan cho tôi, phần nào generate bằng js đc thì tôi sẽ xóa sau khi dự án hoàn thành --> 

                </div>
 
                <button id="add-schedule-row">add new</button>
            </div>
        </section>

        <section id="about">
            <h2>About</h2>
            <p>This section contains information about me.</p>
        </section>

        <section id="contact">
            <h2>Contact</h2>
            <p>You can contact me at <a href="mailto:example@email.com">example@email.com</a></p>
        </section>

        <template id="schedule__row--template">
            <div class="schedule__row" data-id="">    
                <input class="row__time" name="row-time" type="text" placeholder="07:30">                 
                <input class="row__content" name="row-content" type="text" placeholder="Nhập nội dung">
                <input class="row__date" name="row-date" type="text" placeholder="12-07-2026">
                <div class="row__menu">
                    <button class="menu__button" type="button">O<br>O<br>O</button>
                    <div class="menu__dropdown">
                        <div class="dropdown__container">
                            <div class="row__color">
                                <button type="button" class="color__button">
                                </button>
                                <div class="color__dropdown">
                                    <button class="color__taker" type="button" data-color="#FAFAFA">⬜ White</button>
                                    <button class="color__taker" type="button" data-color="#ffff62">🟨 Yellow</button>
                                    <button class="color__taker" type="button" data-color="#FF1744">🟥 Red</button>
                                </div>
                            </div>
                            <button class="row__notify" type="button">O</button>
                            <button class="row__delete" type="button">X</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

    </main>
    <script type="module" src="index.js"></script>
</body>

</html>
