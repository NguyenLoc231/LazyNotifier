<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LazyNotifier</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <nav id="top-nav-bar">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home">
            <h1>Mi Schedule</h1>
            <div id="list__head">
                <button type="button">&lt</button>
                <input id="list__date" type="text" name="date" required>
                <button type="button">&gt</button>
            </div>

            <div id="schedule__list">
                <div id="list__container">

                    <!-- html để trực quan cho tôi, phần nào generate bằng js đc thì tôi sẽ xóa sau khi dự án hoàn thành --> 

                </div>
 
                <button id="add-schedule-row">add new</button>
            </div>
        </section>

        <section id="about">
            <h2>About</h2>
            <p> Year 2 IT student from International University.</p>
        </section>

        <section id="contact">
            <h2>Contact</h2>
            <p>You can contact me at <a href="mailto: ITITIU25018@student.hcmiu.edu.vn">example@email.com</a></p>
        </section>
        <button id="clear-storage" onclick="localStorage.clear()">Clear Storage</button>

        <template id="schedule__row--template">
            <div class="schedule__row" data-id="">    
                <input class="row__time" name="row-time" type="text" value="07:00">                 
                <input class="row__content" name="row-content" type="text" placeholder="Nhập nội dung">
                <input class="row__date" name="row-date" type="text" placeholder="00-00-0000">
                <div class="row__menu">
                    <button class="menu__button" type="button">O<br>O<br>O</button>
                    <div class="menu__dropdown">
                        <div class="dropdown__container">
                            <div class="row__color">
                                <button type="button" class="color__button">
                                </button>
                                <div class="color__dropdown">
                                    <button class="color__taker" type="button" data-color="#FAFAFA">⬜ White</button>
                                    <button class="color__taker" type="button" data-color="#ffff62">🟨 Yellow</button>
                                    <button class="color__taker" type="button" data-color="#FF1744">🟥 Red</button>
                                </div>
                            </div>
                            <button class="row__notify" type="button" data-notify="true">
                                <svg class="icon-bell" viewBox="0 0 24 24">
                                    <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1-1.5-1s-1.5.17-1.5 1v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                                </svg>
                            </button>
                            <button class="row__delete" type="button">X</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>
<!--
        <template id="normal-bell">
            <svg class="icon-bell" viewBox="0 0 24 24">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1-1.5-1s-1.5.17-1.5 1v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
            </svg>
        </template>
        <template id="slash-bell">
            <svg class="icon-bell" viewBox="0 0 24 24">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-11c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1-1.5-1s-1.5.17-1.5 1v.68C9.72 5.3 8.64 6.42 8 7.84v.02l9.9 9.9M2.27 2.27L1 3.54l4.25 4.25C5.1 8.84 5 9.9 5 11v5l-2 2v1h13.73l4.25 4.25 1.27-1.27L2.27 2.27z"/>
            </svg>
        </template>
-->        
    </main>
    <script type="module" src="index.js"></script>
</body>

</html>
