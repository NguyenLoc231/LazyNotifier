<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LazyNotifier</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <nav id="top-nav-bar">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <h1>Schedule Reminder</h1>
    </header>

    <main>
        <section id="home">
            <h2>Mi Schedule</h2>
            <div>
                <button type="button">move to the previous day</button><br>
                <input type="date" name="date" required><br>
                <button type="button">move to the next day</button>
            </div>

            <div id="schedule-list">
                <div id="schedule-row-container">
                    <!-- html để trực quan cho tôi, phần nào generate bằng js đc thì tôi sẽ xóa sau khi dự án hoàn thành --> 
                    <div class="schedule-row">    
                        <input class="schedule-row__time" type="text" placeholder="7h30" onfocus="(this.type='time')(this.classList.add('schedule-row__time-onfocus'))" onblur="(this.type='text')(this.classList.remove('schedule-row__time-onfocus'))">                 
                        <input class="schedule-row__content" type="text" placeholder="Nhập nội dung">
                        <input class="schedule-row__date" type="text" placeholder="7h30" onfocus="(this.type='date')(this.classList.add('schedule-row__date-onfocus'))" onblur="(this.type='text')(this.classList.remove('schedule-row__date-onfocus'))">
                        <div class="schedule-row__menu">
                            <button class="schedule-row__menu-button" type="button">O<br>O<br>O</button>
                            <div class="schedule-row__menu-dropdown">
                                <div class="schedule-row__menu-dropdown-container">
                                    <div class="schedule-row__color">
                                        <button type="button" class="schedule-row__color-display">
                                        </button>
                                        <div class="schedule-row__color-dropdown">
                                            <button type="button" data-color="#FAFAFA">⬜ White</button>
                                            <button type="button" data-color="#ffff62">🟨 Yellow</button>
                                            <button type="button" data-color="#FF1744">🟥 Red</button>
                                        </div>
                                    </div>
                                    <button class="schedule-row__notify" type="button">O</button>
                                    <button class="schedule-row__delete" type="button">X</button>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>
 
                <button id="add-schedule-row">add new</button>
            </div>
        </section>

        <section id="about">
            <h2>About</h2>
            <p>This section contains information about me.</p>
        </section>

        <section id="contact">
            <h2>Contact</h2>
            <p>You can contact me at <a href="mailto:example@email.com">example@email.com</a></p>
        </section>

    </main>
    <script src="script.js"></script>
</body>

</html>
