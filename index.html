<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LazyNotifier</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <nav id="top-nav-bar">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <h1>Schedule Reminder</h1>
    </header>

    <main>
        <section id="home">
            <h2>Mi Schedule</h2>
            <div>
                <button type="button">move to the previous day</button>
                <input type="date" name="date" required>
                <button type="button">move to the next day</button>
            </div>

            <div id="schedule-list">
                <div class="schedule-row">
                    <div class="schedule-row__color">
                        <label><input type="radio" name="choose-color" value="red" class="schedule-row__color-input">RED</label>
                        <br>
                        <label><input type="radio" name="choose-color" value="white" class="schedule-row__color-input">WHITE</label>
                        <br>
                        <label><input type="radio" name="choose-color" value="yellow" class="schedule-row__color-input">YELLOW</label>
                    </div>
                    <input type="text" class="schedule-row__content">
                    <input type="time" class="schedule-row__time">
                    <input type="date" class="schedule-row__deadline">
                    <input type="checkbox" checked class="schedule-row__notify">
                    <button type="button" class="schedule-row__delete">X</button>
                </div>
                <button id="add-schedule-row">add new</button>
            </div>
        </section>

        <section id="about">
            <h2>About</h2>
            <p>This section contains information about me.</p>
        </section>

        <section id="contact">
            <h2>Contact</h2>
            <p>You can contact me at <a href="mailto:example@email.com">example@email.com</a></p>
        </section>

    </main>
    <script src="script.js"></script>
</body>

</html>
