<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LazyNotifier</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <nav id="top-navbar">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <main>
        <section id="home">
            <h2>Task list</h2>
            <div>
                <button type="button">move to the previous day</button>
                <input type="date" name="date" required>
                <button type="button">move to the next day</button>
            </div>

            <div id="task-list-table">
                <div class="task">
                    <div class="task-color">
                        <label><input type="radio" name="choose-color" value="red">RED</label>
                        <label><input type="radio" name="choose-color" value="white">WHITE</label>
                        <label><input type="radio" name="choose-color" value="yellow">YELLOW</label>
                    </div>
                    <input type="text" class="task-content">
                    <input type="time" class="task-time">
                    <input type="date" class="task-deadline">
                    <input type="checkbox" checked class="task-notifier">
                    <button type="button" class="task-delete-btn">X</button>
                </div>
                <button id="add-task-btn">add new</button>
            </div>
        </section>

        <section id="about">
            <h2>About</h2>
            <p>This section contains information about me.</p>
        </section>

        <section id="contact">
            <h2>Contact</h2>
            <p>You can contact me at <a href="mailto:example@email.com">example@email.com</a></p>
        </section>

    </main>
    <script src="script.js"></script>
</body>

</html>
